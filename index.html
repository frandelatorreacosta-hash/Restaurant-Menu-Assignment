<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Menus</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

/* Common menu style */
.menu {
    width: 400px;
    height: 550px;
    margin: 20px;
    padding: 20px;
    border: 3px solid #333;
    color: black;
    display: inline-block;
    vertical-align: top;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}

/* Individual menus */
.breakfast {
    background-image: url("menu.png");
}

.lunch {
    background-image: url("menu.png");
}

.dinner {
    background-image: url("menu.png");
}

h2 {
    text-align: center;
    border-bottom: 2px solid white;
    padding-bottom: 10px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="menu breakfast">
    <h2>Breakfast Menu</h2>
    <ul>
        <li>Pancakes</li>
        <li>Scrambled Eggs</li>
        <li>Toast & Butter</li>
        <li>Coffee</li>
        <li>Orange Juice</li>
    </ul>
</div>

<div class="menu lunch">
    <h2>Lunch Menu</h2>
    <ul>
        <li>Grilled Chicken Sandwich</li>
        <li>Caesar Salad</li>
        <li>Burger & Fries</li>
        <li>Iced Tea</li>
        <li>Lemonade</li>
    </ul>
</div>

<div class="menu dinner">
    <h2>Dinner Menu</h2>
    <ul>
        <li>Steak</li>
        <li>Grilled Salmon</li>
        <li>Pasta Alfredo</li>
        <li>Red Wine</li>
        <li>Cheesecake</li>
    </ul>
</div>

</body>
</html>
